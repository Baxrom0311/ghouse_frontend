<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">AgroAI app icon</title>
  <desc id="desc">Modern AI greenhouse icon for AgroAI smart greenhouse app.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <path d="M0 128h512M0 256h512M0 384h512M128 0v512M256 0v512M384 0v512" stroke="#10b981" stroke-opacity="0.06" stroke-width="1"/>
  <!-- Main leaf shape -->
  <path d="M140 360c30-100 100-160 200-170 40-4 76 2 108 18-4 84-32 148-82 190-54 46-124 52-204 20 44-68 96-112 156-132-80 18-138 54-178 108Z" fill="url(#leaf)"/>
  <!-- Leaf vein -->
  <path d="M160 380c60-8 128 0 200 20 38 10 70 18 96 22" fill="none" stroke="#a7f3d0" stroke-width="14" stroke-linecap="round" stroke-opacity="0.7"/>
  <!-- AI circuit dots -->
  <circle cx="340" cy="180" r="8" fill="url(#glow)"/>
  <circle cx="380" cy="220" r="6" fill="url(#glow)"/>
  <circle cx="300" cy="210" r="5" fill="url(#glow)"/>
  <circle cx="360" cy="160" r="5" fill="url(#glow)"/>
  <!-- AI circuit lines -->
  <path d="M340 180l40 40M340 180l-40 30M360 160l-20 20" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.5"/>
  <!-- Sun/AI indicator -->
  <circle cx="400" cy="112" r="36" fill="#fbbf24" fill-opacity="0.9"/>
  <circle cx="400" cy="112" r="24" fill="#fcd34d"/>
</svg>
