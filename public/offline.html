<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgroAI offline</title>
    <meta name="theme-color" content="#07110b" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07110b;
        color: #ecfdf5;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        text-align: center;
      }

      .mark {
        width: 76px;
        height: 76px;
        margin: 0 auto 24px;
        border-radius: 24px;
        background: #10251e;
        display: grid;
        place-items: center;
        color: #22c55e;
        font-size: 42px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 8vw, 40px);
      }

      p {
        margin: 0;
        color: #bbf7d0;
        line-height: 1.55;
      }

      button {
        margin-top: 28px;
        border: 0;
        border-radius: 999px;
        background: #22c55e;
        color: #052e16;
        font: inherit;
        font-weight: 700;
        padding: 14px 22px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">⌁</div>
      <h1>Internet aloqasi yo'q</h1>
      <p>AgroAI ilovasi ochiladi, lekin yangi sensor ma'lumotlari va buyruqlar uchun internet kerak.</p>
      <button type="button" onclick="location.reload()">Qayta urinish</button>
    </main>
  </body>
</html>
